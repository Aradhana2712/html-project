<!DOCTYPE html>
<html>
    <head>
        <title>
            HTML Form
        </title>
    </head>
    <body>
        <h1>HTML Form</h1><br>
        <form>
            <label for "fn" >First Name:</label>
            <input type = "text",id = "fn", name = "First Name",default value = "First Name">
            <label for "ln" >Last Name:</label>
            <input type = "text",id = "ln", name = "Last Name",default value = "Last Name">
            <label for "ag" >Age:</label>
            <input type = "text",id = "ag", name = "Age",default value = "Age"><br>
            <label for "em" >Email:</label>
            <input type = "text",id = "em", name = "Email",default value = "Email">
            <label for "pw" >Password:</label>
            <input type = "password",id = "pw", name = "password">
        </form>
    </body>
</html>
