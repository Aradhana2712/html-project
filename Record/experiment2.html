<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>
            CSS Enhancements - Shadows,Borders,Background
        </title>
        <style>
           body{
		text-align : center;
		background-color : rgb(232, 223, 223);
		}
	
	header{
	text-align : center;
	padding : 30px;
	background-color : rgba(255,255,255,0.8);
	box-shadow : 10px 10px 5px rgb(141, 210, 233);
	}
	header h1{
	color: rgb(0, 0, 0);
	text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.964);

	}
	footer{
	text-align: center;
	background-color: rgba(0,0,0.7);
	color: white;

	font-size:16px;
	border-top-left-radius: 10px;
	border-top-right-radius: 10px;
	}
	footer p{
	margin : 0;
	}
	.card{
	background-color: rgb(140, 190, 232);

	padding: 30px;

       <header> <h1> CSS Enhancements Demo</h1>
	</header>
	<div class = "card">

	<h2 text-color = "blue"> Welcome to CSS Styling</h2>
	<p>
	This webpage demonstrates <strong>shadows</strong> , <strong>rounded border</strong> , and <strong>multiple <br>backround images</strong> using CSS.
</p>
</div>
