<html>
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content="width = device-width,initial-scale = 1.0">
        <title>Birthday Surprise</title>
        <style>
            body {
                margin:0;
                padding:0;
                height: 100vh;
                font-family: Arial,sans-serif;
                background:url("https://i.ibb.co/4VXL5Vd/pink-stars-bg.jpg")no-repeat center center fixed;
                background-size: cover;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .page{
                display: none;
                background: rgba(219, 166, 192, 0.85);
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.25);
                text-align: center;
                width:90%;
                max-width: 600px;
            }
            #password-page {display:block;}
            input{
                padding : 10px;
                font-size: 1.2em;
                border-radius: 8px;
                border:1px solid #ccc;
                width: 200px;
                text-align: center;
            }
            button {
                margin-top: 15px;
                padding: 10px 25px;
                background: #ff6b6b;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1.1em;
                cursor:pointer;
                transition: 0.3s;
            }
            button:hover {
                background: #ff4b4b;
            }
            #cake{
                font-size: 10em;
                position: relative;
                cursor: pointer;
                user-select: none;
            }
            #candle{
                position: absolute;
                top: 12%;
                left: 50%;
                transform : translateX(-50%);
                font-size:0.25em;
                animation:flicker 1.5s infinite;
                cursor: pointer;
            }
            @keyframes flicker {
                0% , 100%{opacity: 1;}
                50%{opacity: 0.5;}
            }
            #birthday-page{
                background: url("https://i.ibb.co/0D9VPPH/cute-bear-bg.jpg")no-repeat center center /cover;
                color: #333;
                position: relative;
            }
            .card{
                background: rgba(218, 218, 85, 0.85);
                padding:20px;
                border-radius: 12px;
                font-size: 1.2em;
                box-shadow: 0 0 10px rgba(255, 150, 150, 0.5);
                margin-bottom: 20px;
            }
            
        </style>
    </head>
</html>
